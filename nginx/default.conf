upstream django_backend {
    server backend:8000;
}

# HTTP — solo acepta challenge de Let's Encrypt, redirige el resto a HTTPS
server {
    listen 80;
    server_name tu-dominio.duckdns.org;  # CAMBIAR por tu dominio real

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl;
    server_name tu-dominio.duckdns.org;  # CAMBIAR por tu dominio real

    ssl_certificate     /etc/letsencrypt/live/tu-dominio.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tu-dominio.duckdns.org/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    client_max_body_size 20M;

    # React SPA
    location / {
        root  /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Django API, admin y documentación
    location ~ ^/(api|admin)/ {
        proxy_pass         http://django_backend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 90;
    }

    # Archivos estáticos de Django (admin CSS, DRF browsable API)
    location /static/ {
        alias   /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Archivos subidos por usuarios
    location /media/ {
        alias   /app/media/;
        expires 7d;
    }
}
